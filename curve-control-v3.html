<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Curve Control - Refined UI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');

:root {
  --ice: #FF45B8;
  --ice-glow: rgba(255,69,184,0.28);
  --bg: #F9F9F7;
  --ink: #1C1C1C;
  --ink-muted: #AAAAAA;
  --olive: #8E9900;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: var(--bg); font-family: 'DM Mono', monospace; overflow: hidden; touch-action: none; user-select: none; }

#header { position: fixed; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 28px 40px 0; z-index: 60; }
#live-score { font-size: 0.58rem; letter-spacing: 0.22em; color: var(--ink-muted); }

#stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
#svg-wrapper { position: absolute; }
#svg-canvas { display: block; pointer-events: none; overflow: visible; }

/* Path is always stable — no color, no weight change on docking */
#s-path { fill: var(--olive); opacity: 0.55; }
#s-path.docking { /* intentionally empty — docking class kept for JS toggle, visuals suppressed */ }

.t-ring { fill: none; stroke: transparent; r: 6; opacity: 0; transition: opacity 0.4s; }
.t-ring.revealed { opacity: 1; stroke: rgba(0,0,0,0.15); stroke-dasharray: 3 3; }
.t-ring.placed-here { stroke: var(--ice); stroke-dasharray: none; }

/* Guide lines hidden */
.guide { display: none !important; }

.upt { width: 12px; height: 12px; border-radius: 50%; background: var(--ice); position: fixed; transform: translate(-50%, -50%); cursor: grab; z-index: 50; box-shadow: 0 2px 10px var(--ice-glow); }
.upt.is-dragging { cursor: grabbing; z-index: 90; transform: translate(-50%, -50%) scale(1.3); }

#bottom-ui { position: fixed; bottom: 0; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 40px; gap: 15px; z-index: 60; }

#verify-btn { 
  padding: 13px 48px; 
  background: var(--ice);
  color: var(--ink); 
  border: none; 
  border-radius: 30px;
  font-family: 'DM Mono', monospace; 
  font-size: 0.6rem; 
  letter-spacing: 0.26em; 
  text-transform: uppercase; 
  cursor: pointer; 
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px var(--ice-glow);
}
#verify-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px var(--ice-glow); }
#verify-btn:active:not(:disabled) { transform: translateY(0); }
#verify-btn:disabled { opacity: 0.3; cursor: not-allowed; }

#score-bar { display: flex; flex-direction: column; align-items: center; gap: 10px; opacity: 0; }
#score-track { width: 140px; height: 1px; background: #E0DDD8; position: relative; }
#score-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--ice); width: 0%; transition: width 0.8s ease-out; }
#score-text { font-size: 0.6rem; color: var(--ink-muted); text-align: center; width: 140px; }
#reset-btn { background: none; border: none; font-size: 0.55rem; color: var(--ink-muted); cursor: pointer; margin-top: 5px; }

#snap-label { position: fixed; font-size: 0.52rem; color: var(--ice); text-transform: uppercase; opacity: 0; pointer-events: none; z-index: 80; }
</style>
</head>
<body>

<div id="header">
  <svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="0.5" y="0.5" width="199" height="59" rx="29.5" stroke="#8E9900"/>

199 25.988 117.655 25.988C115.063 25.988 113.431 28.028 113.431 30.716ZM128.098 30.26V36.5H126.658V24.86H128.026V26.948C128.794 25.508 130.354 24.668 132.082 24.668C134.866 24.668 136.69 26.588 136.69 29.9V36.5H135.25V29.972C135.25 27.332 133.978 25.988 131.914 25.988C129.61 25.988 128.098 27.668 128.098 30.26ZM141.827 26.084H138.779V24.86H141.827V21.74H143.243V24.86H146.291V26.084H143.243V29.204H141.827V26.084ZM143.243 30.164V32.588C143.243 34.436 143.795 35.18 145.427 35.18H146.891V36.452C146.603 36.476 146.195 36.5 145.523 36.5C142.883 36.5 141.827 35.276 141.827 32.516V30.164H143.243ZM151.184 30.836V36.5H149.744V24.86H151.112V27.62C151.4 25.988 152.912 24.86 154.808 24.86H156.032L155.984 26.156H155.024C152.576 26.156 151.184 27.812 151.184 30.836ZM157.06 30.716C157.06 27.236 159.268 24.668 162.748 24.668C166.156 24.668 168.364 27.236 168.364 30.716C168.364 34.172 166.156 36.74 162.748 36.74C159.316 36.74 157.06 34.172 157.06 30.716ZM158.524 30.716C158.524 33.38 160.156 35.42 162.748 35.42C165.292 35.42 166.9 33.38 166.9 30.716C166.9 28.028 165.292 25.988 162.748 25.988C160.156 25.988 158.524 28.028 158.524 30.716ZM173.192 19.58V36.5H171.752V19.58H173.192Z" fill="#8E9900"/>
  </svg>
  <span id="live-score">0 / 14</span>
</div>

<div id="stage">
  <div id="svg-wrapper">
    <svg id="svg-canvas" viewBox="0 0 346 458">
      <path id="s-path" d="M75.0283 309.6L75.0986 311.527C75.9808 335.785 85.2227 356.157 102.07 370.488C118.943 384.841 143.641 393.3 175.7 393.3V395.3L174.187 395.293C110.339 394.764 74.8856 360.713 73.0996 311.6H2C2 395.3 70.3998 455.6 174.8 455.6C275.6 455.6 343.1 404.299 343.1 328.699C343.099 267.499 299.899 221.6 217.1 200L156.8 183.8C101.872 168.739 83.5713 150.189 83.0127 120.426L83 119C83 85.7 114.5 62.2998 168.5 62.2998L169.825 62.3057C225.788 62.7929 263.014 94.158 264.8 139.699H335.899C332.327 57.5464 266.737 2.85935 169.894 2.00977L167.6 2C74.8997 2.00007 9.2002 53.2997 9.2002 122.6L9.20703 123.988C9.82149 182.617 49.4818 221.783 136.1 245L199.1 261.199C250.4 275.599 269.3 298.1 269.3 329.6L269.293 330.546C268.75 370.492 233.743 395.3 175.7 395.3V393.3C204.697 393.3 227.644 387.049 243.283 376.004C258.847 365.011 267.3 349.191 267.3 329.6C267.3 314.301 262.733 301.327 252.009 290.387C241.222 279.382 224.061 270.287 198.591 263.134L135.602 246.937L135.592 246.934L135.582 246.932C91.7681 235.188 59.6742 219.318 38.5176 198.733C17.2939 178.083 7.2002 152.805 7.2002 122.6C7.2002 51.7346 74.3203 7.49558e-05 167.6 0C217.013 0 258.666 13.828 288.455 38.2529C318.27 62.6985 336.073 97.6603 337.897 139.612L337.988 141.699H262.877L262.802 139.778C261.924 117.397 252.288 98.586 235.977 85.3398C219.64 72.0733 196.489 64.2998 168.5 64.2998C141.758 64.2998 120.82 70.098 106.63 79.8125C92.5007 89.4856 85 103.067 85 119L85.0127 120.381C85.2768 134.565 89.6702 145.947 100.322 155.659C111.44 165.796 129.514 174.243 157.318 181.868L217.604 198.064C259.238 208.925 291.107 225.943 312.586 248.107C334.1 270.308 345.1 297.584 345.1 328.699C345.1 367.159 327.904 399.462 297.956 422.095C268.051 444.695 225.518 457.6 174.8 457.6C122.223 457.6 78.5358 442.414 47.957 416.514C17.355 390.593 1.46272e-06 354.033 0 311.6V309.6H75.0283Z" />
      <g id="rings-group"></g>
    </svg>
  </div>
</div>

<div id="bottom-ui">
  <button id="verify-btn">Verify Curves</button>
  <div id="score-bar">
    <div id="score-track"><div id="score-fill"></div></div>
    <span id="score-text">—</span>
  </div>
  <button id="reset-btn">↺ &nbsp;Reset</button>
</div>
<div id="snap-label"></div>

<script>
// Hedef koordinatlar (Skeleton Space)
const TARGETS = [
  {x:263.05, y:141.8}, {x:335.1, y:141.8}, {x:0, y:312.8}, {x:172.3, y:395.8},
  {x:172.3, y:0}, {x:345.1, y:327.8}, {x:152.3, y:248.8}, {x:182.55, y:188.8},
  {x:83.3247, y:121.8}, {x:268.05, y:327.8}, {x:7, y:121.8}, {x:172.3, y:457.6},
  {x:73.3247, y:312.8}, {x:172.3, y:63.7999}
];

const VW = 346, VH = 458, SNAP_THRESHOLD = 18;
const svgWrapper = document.getElementById('svg-wrapper'), svgCanvas = document.getElementById('svg-canvas');
const ringsGroup = document.getElementById('rings-group'), sPath = document.getElementById('s-path');
const verifyBtn = document.getElementById('verify-btn'), scoreFill = document.getElementById('score-fill');
const scoreText = document.getElementById('score-text'), liveScore = document.getElementById('live-score');

let scale = 1, wLeft = 0, wTop = 0, pts = [], placed = 0, verified = false, activeIdx = -1, dragAnchor = null;

function layout() {
  const vw = window.innerWidth, vh = window.innerHeight;
  scale = Math.min((vw - 80) / VW, (vh - 200) / VH) * 0.62; // reduced for bottom breathing room
  const rw = VW * scale, rh = VH * scale;
  wLeft = (vw - rw) / 2;
  wTop = (vh - rh) / 2 - 45; // Dikey merkezleme nüdgesi
  svgWrapper.style.width = rw + 'px'; svgWrapper.style.height = rh + 'px';
  svgWrapper.style.left = wLeft + 'px'; svgWrapper.style.top = wTop + 'px';
}

const toScreen = (sx, sy) => ({ x: wLeft + sx * scale, y: wTop + sy * scale });

function buildRings() {
  ringsGroup.innerHTML = '';
  TARGETS.forEach(t => {
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', t.x); c.setAttribute('cy', t.y); c.setAttribute('r', 6); c.setAttribute('class', 't-ring');
    ringsGroup.appendChild(c);
  });
}

function buildDots() {
  document.querySelectorAll('.upt').forEach(e => e.remove());
  pts = []; placed = 0; verified = false; liveScore.textContent = '0 / 14';
  verifyBtn.disabled = false; document.getElementById('score-bar').style.opacity = 0;
  sPath.classList.remove('docking');
  TARGETS.forEach((_, i) => {
    const el = document.createElement('div'); el.className = 'upt'; document.body.appendChild(el);
    el.style.left = (wLeft + Math.random() * (VW * scale)) + 'px';
    el.style.top = (wTop + Math.random() * (VH * scale)) + 'px';
    pts.push({ el, snappedTo: -1 });
    gsap.to(el, { x: "random(-10,10)", y: "random(-10,10)", duration: 3, repeat: -1, yoyo: true, ease: 'sine.inOut' });
    el._ptIdx = i; el.addEventListener('mousedown', startDrag); el.addEventListener('touchstart', startDrag);
  });
}

function startDrag(e) {
  if(verified) return;
  e.preventDefault(); const el = e.currentTarget; activeIdx = el._ptIdx;
  gsap.killTweensOf(el); gsap.set(el, { x: 0, y: 0 });
  const { cx, cy } = getCoord(e);
  dragAnchor = { mx: cx, my: cy, ex: parseFloat(el.style.left), ey: parseFloat(el.style.top) };
  if(pts[activeIdx].snappedTo !== -1) {
    document.querySelectorAll('.t-ring')[pts[activeIdx].snappedTo].classList.remove('placed-here');
    pts[activeIdx].snappedTo = -1; placed--; liveScore.textContent = `${placed} / 14`;
  }
  el.classList.add('is-dragging');
}

function moveDrag(e) {
  if (activeIdx === -1) return;
  const { cx, cy } = getCoord(e);
  let px = dragAnchor.ex + (cx - dragAnchor.mx), py = dragAnchor.ey + (cy - dragAnchor.my);
  
  // Magnetic pull (Claude's logic)
  let docking = false;
  TARGETS.forEach((t, i) => {
    const sc = toScreen(t.x, t.y);
    const dist = Math.hypot(px - sc.x, py - sc.y);
    if(dist < 55 && !pts.some(p => p.snappedTo === i)) {
      const pull = Math.pow(1 - dist/55, 2) * 0.45;
      px += (sc.x - px) * pull; py += (sc.y - py) * pull;
      if(dist < 35) docking = true;
    }
  });

  const el = pts[activeIdx].el; el.style.left = px + 'px'; el.style.top = py + 'px';
  // docking class toggled for JS state tracking only — no visual change applied
  sPath.classList.toggle('docking', docking);
}

function endDrag() {
  if (activeIdx === -1) return;
  const idx = activeIdx, el = pts[idx].el; activeIdx = -1;
  sPath.classList.remove('docking'); el.classList.remove('is-dragging');
  const px = parseFloat(el.style.left), py = parseFloat(el.style.top);
  let snapIdx = -1;
  TARGETS.forEach((t, i) => {
    const sc = toScreen(t.x, t.y);
    if(Math.hypot(px - sc.x, py - sc.y) < SNAP_THRESHOLD && !pts.some(p => p.snappedTo === i)) snapIdx = i;
  });
  if(snapIdx !== -1) {
    const sc = toScreen(TARGETS[snapIdx].x, TARGETS[snapIdx].y);
    gsap.to(el, { left: sc.x, top: sc.y, duration: 0.4, ease: 'elastic.out(1, 0.5)' });
    pts[idx].snappedTo = snapIdx; placed++; liveScore.textContent = `${placed} / 14`;
  } else {
    gsap.to(el, { x: "random(-10,10)", y: "random(-10,10)", duration: 3, repeat: -1, yoyo: true, ease: 'sine.inOut' });
  }
}

function getCoord(e) {
  const t = e.touches ? e.touches[0] : e;
  return { cx: t.clientX, cy: t.clientY };
}

document.addEventListener('mousemove', moveDrag); document.addEventListener('touchmove', moveDrag, {passive: false});
document.addEventListener('mouseup', endDrag); document.addEventListener('touchend', endDrag);

verifyBtn.addEventListener('click', () => {
  verified = true; verifyBtn.disabled = true;
  document.querySelectorAll('.t-ring').forEach((r, i) => {
    setTimeout(() => { r.classList.add('revealed'); if(pts.some(p => p.snappedTo === i)) r.classList.add('placed-here'); }, i*40);
  });
  let err = 0;
  TARGETS.forEach(t => {
    const sc = toScreen(t.x, t.y); let min = 100;
    pts.forEach(p => min = Math.min(min, Math.hypot(parseFloat(p.el.style.left)-sc.x, parseFloat(p.el.style.top)-sc.y)));
    err += Math.min(min, 60);
  });
  const acc = Math.max(0, 100 - (err / (14*60))*100);
  document.getElementById('score-bar').style.opacity = 1; scoreFill.style.width = acc+'%'; scoreText.textContent = acc.toFixed(1)+'%';
});

document.getElementById('reset-btn').addEventListener('click', buildDots);
window.addEventListener('resize', () => { layout(); buildDots(); });
layout(); buildRings(); buildDots();
</script>
</body>
</html>
