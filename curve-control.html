<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Curve Control</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');

:root {
  --ice: #B8CEFA;
  --ice-glow: rgba(184,206,250,0.35);
  --ice-dim: rgba(184,206,250,0.14);
  --guide: rgba(184,206,250,0.5);
  --bg: #FFFFFF;
  --ink: #1C1C1C;
  --ink-muted: #AAAAAA;
  --stroke-fill: rgba(0,0,0,0.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: 'DM Mono', monospace;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

/* ── HEADER ── */
#header {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 28px 40px 0;
  z-index: 60;
}
#logo-svg { display: block; }
#live-score {
  font-size: 0.58rem;
  letter-spacing: 0.22em;
  color: var(--ink-muted);
}

/* ── STAGE ── */
#stage {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
#svg-wrapper {
  position: absolute;
  /* sized and positioned by JS */
}

/* SVG Canvas */
#svg-canvas {
  display: block;
  pointer-events: none;
  overflow: visible;
}
#s-path {
  transition: fill 0.3s, stroke 0.3s, stroke-width 0.3s;
}
#s-path.docking {
  fill: none !important;
  stroke: var(--ice);
  stroke-width: 2.5;
  filter: drop-shadow(0 0 8px var(--ice-glow));
}

/* Target rings — hidden during game, revealed on verify */
.t-ring {
  fill: none;
  stroke: transparent;
  stroke-width: 1;
  r: 6;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s, stroke 0.3s;
}
.t-ring.revealed {
  opacity: 1;
  stroke: rgba(0,0,0,0.15);
  stroke-dasharray: 3 3;
}
.t-ring.placed-here {
  stroke: var(--ice);
  stroke-dasharray: none;
}

/* ── GUIDE LINES ── */
.guide {
  position: absolute;
  pointer-events: none;
  opacity: 0;
  z-index: 40;
  will-change: opacity;
  transition: opacity 0.08s;
}
.guide-x {
  width: 1px; height: 700px;
  top: 50%; transform: translateY(-50%);
  background: linear-gradient(to bottom,
    transparent 0%, var(--guide) 28%, var(--guide) 72%, transparent 100%);
}
.guide-y {
  height: 1px; width: 900px;
  left: 50%; transform: translateX(-50%);
  background: linear-gradient(to right,
    transparent 0%, var(--guide) 22%, var(--guide) 78%, transparent 100%);
}

/* ── USER DOTS ── */
.upt {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--ice);
  position: fixed;
  transform: translate(-50%, -50%);
  cursor: grab;
  z-index: 50;
  box-shadow: 0 2px 10px var(--ice-glow);
  will-change: left, top;
}
.upt.is-dragging {
  cursor: grabbing;
  box-shadow: 0 4px 22px var(--ice-glow), 0 0 0 2px rgba(184,206,250,0.2);
  z-index: 90;
}

/* ── BOTTOM UI ── */
#bottom-ui {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; flex-direction: column; align-items: center;
  padding-bottom: 36px;
  gap: 14px;
  z-index: 60;
}
#verify-btn {
  padding: 13px 48px;
  background: var(--ink);
  color: var(--bg);
  border: none;
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s, transform 0.12s;
}
#verify-btn:hover:not(:disabled) { background: #333; }
#verify-btn:active:not(:disabled) { transform: scale(0.97); }
#verify-btn:disabled { opacity: 0.3; cursor: not-allowed; }

#reset-btn {
  font-family: 'DM Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  background: none; border: none;
  color: var(--ink-muted);
  cursor: pointer;
  transition: color 0.2s;
  padding: 2px 0;
}
#reset-btn:hover { color: var(--ink); }

#score-bar {
  display: flex; align-items: center; gap: 14px;
  opacity: 0;
  transition: opacity 0.4s;
}
#score-track {
  width: 140px; height: 1px;
  background: #E8E8E8;
  position: relative; overflow: hidden;
}
#score-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: var(--ice);
  width: 0%;
  transition: width 0.9s cubic-bezier(0.23,1,0.32,1);
}
#score-text {
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  color: var(--ink-muted);
  min-width: 64px;
}

/* ── SNAP LABEL ── */
#snap-label {
  position: fixed;
  font-size: 0.52rem;
  letter-spacing: 0.26em;
  color: var(--ice);
  text-transform: uppercase;
  opacity: 0;
  pointer-events: none;
  z-index: 80;
}
</style>
</head>

  </svg>
  <span id="live-score">0 / 14</span>
</div>

<script>
// ─────────────────────────────────────────────────────────────
//  COORDINATE SYSTEM NOTES
//
//  Skeleton path  → viewBox 346 × 458  (origin 0,0)
//  Point-included → viewBox 366 × 478  (origin 0,0), offset +10,+10
//
//  The "point-included" SVG is the skeleton padded by 10px on all
//  sides.  So every circle coordinate maps back to skeleton space by:
//      skeletonX = circleX − 10
//      skeletonY = circleY − 10
//
//  We store TARGETS in skeleton (346×458) space.
// ─────────────────────────────────────────────────────────────

const OFFSET = 10; // padding between the two viewBoxes

// Raw circle coords from point-included SVG → convert to skeleton space
const CIRCLES_RAW = [
  {cx:273.05, cy:151.8},
  {cx:345.1,  cy:151.8},
  {cx:10,     cy:322.8},
  {cx:182.3,  cy:405.8},
  {cx:182.3,  cy:10   },
  {cx:355.1,  cy:337.8},
  {cx:162.3,  cy:258.8},
  {cx:192.55, cy:198.8},
  {cx:93.3247,cy:131.8},
  {cx:278.05, cy:337.8},
  {cx:17,     cy:131.8},
  {cx:182.3,  cy:467.6},
  {cx:83.3247,cy:322.8},
  {cx:182.3,  cy:73.7999},
];

// Convert to skeleton viewBox space
const TARGETS = CIRCLES_RAW.map(c => ({
  x: c.cx - OFFSET,
  y: c.cy - OFFSET,
}));

// ─────────────────────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────────────────────
const VW = 346, VH = 458;     // skeleton viewBox
const SNAP_PX   = 18;          // screen px — hard snap threshold on mouseup
const PULL_ZONE = 54;          // screen px — magnetic pull zone (3× snap)
const GUIDE_THR = 12;          // SVG units — axis-alignment guide trigger
const DOCK_THR  = 30;          // screen px — docking highlight threshold

// ─────────────────────────────────────────────────────────────
//  DOM REFS
// ─────────────────────────────────────────────────────────────
const svgWrapper  = document.getElementById('svg-wrapper');
const svgCanvas   = document.getElementById('svg-canvas');
const ringsGroup  = document.getElementById('rings-group');
const sPath       = document.getElementById('s-path');
const guideXEl    = document.getElementById('guide-x');
const guideYEl    = document.getElementById('guide-y');
const snapLabel   = document.getElementById('snap-label');
const verifyBtn   = document.getElementById('verify-btn');
const resetBtn    = document.getElementById('reset-btn');
const scoreBar    = document.getElementById('score-bar');
const scoreFill   = document.getElementById('score-fill');
const scoreText   = document.getElementById('score-text');
const liveScore   = document.getElementById('live-score');

// ─────────────────────────────────────────────────────────────
//  LAYOUT
// ─────────────────────────────────────────────────────────────
let scale = 1, wLeft = 0, wTop = 0;

function layout() {
  const vw = window.innerWidth, vh = window.innerHeight;
  // Reserve space: ~70px header, ~110px bottom UI
  const padH = 80, padV = 130;
  scale = Math.min((vw - padH) / VW, (vh - padV) / VH);

  const rw = VW * scale, rh = VH * scale;
  // Center vertically but nudge slightly upward to give bottom UI room
  wLeft = (vw - rw) / 2;
  wTop  = (vh - rh) / 2 - 14;

  svgWrapper.style.width    = rw + 'px';
  svgWrapper.style.height   = rh + 'px';
  svgWrapper.style.left     = wLeft + 'px';
  svgWrapper.style.top      = wTop  + 'px';
  svgWrapper.style.position = 'absolute';

  svgCanvas.setAttribute('viewBox', `0 0 ${VW} ${VH}`);
  svgCanvas.style.width  = rw + 'px';
  svgCanvas.style.height = rh + 'px';
}

// Coordinate helpers
const toScreen = (sx, sy) => ({ x: wLeft + sx * scale, y: wTop + sy * scale });
const toSvg    = (px, py) => ({ x: (px - wLeft) / scale, y: (py - wTop) / scale });

// ─────────────────────────────────────────────────────────────
//  BUILD TARGET RINGS  (hidden until Verify)
// ─────────────────────────────────────────────────────────────
const rings = [];

function buildRings() {
  ringsGroup.innerHTML = '';
  rings.length = 0;
  TARGETS.forEach((t, i) => {
    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', t.x);
    c.setAttribute('cy', t.y);
    c.setAttribute('r', 6);
    c.setAttribute('class', 't-ring');
    c.dataset.i = i;
    ringsGroup.appendChild(c);
    rings.push(c);
  });
}

// ─────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────
let pts = [];          // { el, snappedTo: -1 | targetIndex }
let placed = 0;
let verified = false;

// ─────────────────────────────────────────────────────────────
//  BUILD USER DOTS
// ─────────────────────────────────────────────────────────────
function buildDots() {
  document.querySelectorAll('.upt').forEach(e => e.remove());
  pts = [];
  placed = 0;
  verified = false;
  updateLiveScore();
  verifyBtn.disabled = false;
  scoreBar.style.opacity = 0;
  scoreFill.style.width = '0%';
  scoreText.textContent = '—';
  rings.forEach(r => {
    r.classList.remove('revealed','placed-here');
  });
  sPath.classList.remove('docking');

  const N = TARGETS.length;
  // Scatter dots randomly within the S bounding area, avoiding edges
  const margin = 30 * scale;

  TARGETS.forEach((_, i) => {
    const el = document.createElement('div');
    el.className = 'upt';
    document.body.appendChild(el);

    // Random starting position within the SVG area
    const sx = wLeft + margin + Math.random() * (VW * scale - margin * 2);
    const sy = wTop  + margin + Math.random() * (VH * scale - margin * 2);
    el.style.left = sx + 'px';
    el.style.top  = sy + 'px';

    pts.push({ el, snappedTo: -1 });

    // Idle float — killed on drag start
    gsap.to(el, {
      x: `random(-10,10)`, y: `random(-10,10)`,
      duration: `random(2.5,4.5)`, repeat: -1, yoyo: true, ease: 'sine.inOut'
    });

    el._ptIdx = i;
    el.addEventListener('mousedown',  onPointerDown, { passive: false });
    el.addEventListener('touchstart', onPointerDown, { passive: false });
  });
}

// ─────────────────────────────────────────────────────────────
//  DRAG
// ─────────────────────────────────────────────────────────────
let activeIdx  = -1;
let dragAnchor = null;  // { mx, my, ex, ey }

function onPointerDown(e) {
  e.preventDefault();
  const el  = e.currentTarget;
  const idx = el._ptIdx;
  const pt  = pts[idx];
  if (!pt) return;

  // Kill idle tween, reset transform
  gsap.killTweensOf(el);
  gsap.set(el, { x: 0, y: 0 });

  const { cx, cy } = cxy(e);
  activeIdx  = idx;
  dragAnchor = {
    mx: cx, my: cy,
    ex: parseFloat(el.style.left),
    ey: parseFloat(el.style.top),
  };

  // Unsnap if previously placed
  if (pt.snappedTo !== -1) {
    rings[pt.snappedTo].classList.remove('placed-here');
    pt.snappedTo = -1;
    placed = Math.max(0, placed - 1);
    updateLiveScore();
  }

  el.classList.add('is-dragging');
  gsap.to(el, { scale: 1.3, duration: 0.15, ease: 'power2.out' });
}

document.addEventListener('mousemove', onPointerMove, { passive: false });
document.addEventListener('touchmove', onPointerMove, { passive: false });

function onPointerMove(e) {
  if (activeIdx === -1 || !dragAnchor) return;
  e.preventDefault();

  const { cx, cy } = cxy(e);
  const dx = cx - dragAnchor.mx;
  const dy = cy - dragAnchor.my;

  let px = dragAnchor.ex + dx;
  let py = dragAnchor.ey + dy;

  // ── Magnetic gravity (soft pull toward nearest unfilled target) ──
  let magnetX = 0, magnetY = 0;
  let dockingAny = false;

  TARGETS.forEach((t, ti) => {
    // Don't pull toward already-filled slots
    if (pts.some(p => p.snappedTo === ti)) return;
    const sc   = toScreen(t.x, t.y);
    const dist = Math.hypot(px - sc.x, py - sc.y);
    if (dist < DOCK_THR) dockingAny = true;
    if (dist < PULL_ZONE) {
      // Quadratic falloff: max 30% pull at distance 0
      const strength = Math.pow(1 - dist / PULL_ZONE, 2) * 0.30;
      magnetX += (sc.x - px) * strength;
      magnetY += (sc.y - py) * strength;
    }
  });

  px += magnetX;
  py += magnetY;

  const el = pts[activeIdx].el;
  el.style.left = px + 'px';
  el.style.top  = py + 'px';

  // ── Docking highlight ──
  if (dockingAny) sPath.classList.add('docking');
  else            sPath.classList.remove('docking');

  // ── Smart guides (axis-aligned to target points in SVG space) ──
  const sp = toSvg(px, py);
  let showX = false, showY = false, gxLeft = 0, gyTop = 0;

  TARGETS.forEach(t => {
    if (Math.abs(sp.x - t.x) < GUIDE_THR) {
      gxLeft = toScreen(t.x, 0).x - wLeft;
      showX  = true;
    }
    if (Math.abs(sp.y - t.y) < GUIDE_THR) {
      gyTop  = toScreen(0, t.y).y - wTop;
      showY  = true;
    }
  });

  guideXEl.style.left    = showX ? gxLeft + 'px' : guideXEl.style.left;
  guideXEl.style.opacity = showX ? 1 : 0;
  guideYEl.style.top     = showY ? gyTop  + 'px' : guideYEl.style.top;
  guideYEl.style.opacity = showY ? 1 : 0;
}

document.addEventListener('mouseup',  onPointerUp);
document.addEventListener('touchend', onPointerUp);

function onPointerUp() {
  if (activeIdx === -1) return;

  const idx = activeIdx;
  const el  = pts[idx].el;
  activeIdx  = -1;
  dragAnchor = null;

  // Hide guides & docking
  guideXEl.style.opacity = 0;
  guideYEl.style.opacity = 0;
  sPath.classList.remove('docking');
  el.classList.remove('is-dragging');

  const px = parseFloat(el.style.left);
  const py = parseFloat(el.style.top);

  // ── Snap check ──
  let snapped = false;
  TARGETS.forEach((t, ti) => {
    if (snapped) return;
    // Skip if another dot already owns this slot
    if (pts.some(p => p.snappedTo === ti)) return;

    const sc   = toScreen(t.x, t.y);
    const dist = Math.hypot(px - sc.x, py - sc.y);

    if (dist < SNAP_PX) {
      snapped = true;

      // Snap with elastic settle
      gsap.to(el, {
        left: sc.x, top: sc.y,
        scale: 1,
        duration: 0.40, ease: 'elastic.out(1.05, 0.55)',
        onComplete: () => tickPop(el),
      });

      // Ring pulse
      gsap.fromTo(rings[ti],
        { attr: { r: 12 } },
        { attr: { r: 6 }, duration: 0.5, ease: 'elastic.out(1.2, 0.5)' }
      );

      pts[idx].snappedTo = ti;
      placed++;
      updateLiveScore();
      showSnapLabel(sc.x, sc.y);
    }
  });

  if (!snapped) {
    // Return scale, restart idle float
    gsap.to(el, { scale: 1, duration: 0.2, ease: 'power2.out' });
    gsap.to(el, {
      x: `random(-10,10)`, y: `random(-10,10)`,
      duration: `random(2.5,4.5)`, repeat: -1, yoyo: true, ease: 'sine.inOut',
    });
  }
}

// ─────────────────────────────────────────────────────────────
//  MICRO-INTERACTIONS
// ─────────────────────────────────────────────────────────────
function tickPop(el) {
  gsap.timeline()
    .to(el, { scale: 1.55, duration: 0.07, ease: 'power2.out' })
    .to(el, { scale: 0.88, duration: 0.09, ease: 'power2.in'  })
    .to(el, { scale: 1.0,  duration: 0.14, ease: 'back.out(2.5)' });
}

function showSnapLabel(sx, sy) {
  snapLabel.textContent = 'Locked';
  snapLabel.style.left = sx + 'px';
  snapLabel.style.top  = (sy - 22) + 'px';
  gsap.killTweensOf(snapLabel);
  gsap.fromTo(snapLabel,
    { opacity: 0, y: 5 },
    { opacity: 1, y: 0, duration: 0.15, ease: 'power2.out',
      onComplete: () => gsap.to(snapLabel, { opacity:0, y:-6, delay:0.65, duration:0.3 }) }
  );
}

// ─────────────────────────────────────────────────────────────
//  LIVE SCORE
// ─────────────────────────────────────────────────────────────
function updateLiveScore() {
  liveScore.textContent = `${placed} / ${TARGETS.length}`;
}

// ─────────────────────────────────────────────────────────────
//  VERIFY
// ─────────────────────────────────────────────────────────────
verifyBtn.addEventListener('click', () => {
  if (verified) return;
  verified = true;
  verifyBtn.disabled = true;

  // Reveal target rings with staggered fade-in
  rings.forEach((r, i) => {
    setTimeout(() => {
      r.classList.add('revealed');
      // If a dot is placed here, highlight differently
      if (pts.some(p => p.snappedTo === i)) r.classList.add('placed-here');
    }, i * 40);
  });

  // Score: per target, find nearest user dot
  const MAX_ERR = SNAP_PX * 2.8;
  let totalErr = 0;

  TARGETS.forEach((t, ti) => {
    const sc = toScreen(t.x, t.y);
    let minD = Infinity;
    pts.forEach(pt => {
      const px = parseFloat(pt.el.style.left);
      const py = parseFloat(pt.el.style.top);
      const d  = Math.hypot(px - sc.x, py - sc.y);
      if (d < minD) minD = d;
    });
    totalErr += Math.min(minD, MAX_ERR);
  });

  const accuracy = Math.max(0, 100 - (totalErr / (TARGETS.length * MAX_ERR)) * 100);

  // Animate score bar in
  gsap.to(scoreBar, { opacity: 1, duration: 0.5, delay: 0.3 });
  setTimeout(() => {
    scoreFill.style.width = accuracy.toFixed(1) + '%';
    scoreText.textContent = accuracy.toFixed(1) + '%';
  }, 400);
});

// ─────────────────────────────────────────────────────────────
//  RESET
// ─────────────────────────────────────────────────────────────
resetBtn.addEventListener('click', () => {
  buildDots();
});

// ─────────────────────────────────────────────────────────────
//  RESIZE
// ─────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  layout();
  pts.forEach(pt => {
    if (pt.snappedTo !== -1) {
      const t  = TARGETS[pt.snappedTo];
      const sc = toScreen(t.x, t.y);
      pt.el.style.left = sc.x + 'px';
      pt.el.style.top  = sc.y + 'px';
    }
  });
});

// ─────────────────────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────────────────────
function cxy(e) {
  if (e.touches       && e.touches.length)        return { cx: e.touches[0].clientX,        cy: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches.length) return { cx: e.changedTouches[0].clientX, cy: e.changedTouches[0].clientY };
  return { cx: e.clientX, cy: e.clientY };
}

// ─────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────
layout();
buildRings();
buildDots();
</script>
</body>
